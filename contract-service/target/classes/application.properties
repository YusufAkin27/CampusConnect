# =============================================
# CONTRACT SERVICE - Application Properties
# CampusConnect Microservice
# =============================================

# Server
server.port=8090
spring.application.name=contract-service

# =============================================
# DATABASE - PostgreSQL
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/campusconnect_contract
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# CONSUL DISCOVERY
# =============================================
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=contract-service
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.prefer-ip-address=true

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

# =============================================
# OPENAPI / SWAGGER
# =============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# =============================================
# LOGGING
# =============================================
logging.level.contract_service=DEBUG
logging.level.org.hibernate.SQL=DEBUG
