server.port=8080
spring.application.name=api-gateway

# ==========================================
# CONSUL & DISCOVERY
# ==========================================
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.hostname=localhost
spring.cloud.consul.discovery.service-name=api-gateway
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${server.port}
spring.cloud.consul.discovery.prefer-ip-address=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ==========================================
# REDIS (Rate Limiter ?ńin)
# ==========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ==========================================
# SECURITY & LOGGING
# ==========================================
jwt.secret=${JWT_SECRET:RK487/1UdFpWb0BOUKrlvsuo2Y926qxHqeMmG/yAccUC4kXtulxQPZySXE6z1EkHPpc3/lstozo7bClo3FWcAg==}
internal.service.token=${INTERNAL_SERVICE_TOKEN:}

logging.service.url=http://localhost:8085

gateway.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:8080

# ==========================================
# ACTUATOR
# ==========================================
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true

# ==========================================
# GATEWAY ROUTES & RATE LIMITERS
# ==========================================

# --- 1. AUTH SERVICE (ųZEL L?M?TLER) ---
# 1.a) Auth Login (S?k? Limit)
spring.cloud.gateway.routes[0].id=auth-login-route
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/v1/api/auth/login
spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[0].args.rate-limiter=#{@authLoginRateLimiter}
spring.cloud.gateway.routes[0].filters[0].args.key-resolver=#{@ipKeyResolver}

# 1.b) Auth Refresh (Orta Limit)
spring.cloud.gateway.routes[1].id=auth-refresh-route
spring.cloud.gateway.routes[1].uri=lb://auth-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/v1/api/auth/refresh
spring.cloud.gateway.routes[1].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[0].args.rate-limiter=#{@authRefreshRateLimiter}
spring.cloud.gateway.routes[1].filters[0].args.key-resolver=#{@ipKeyResolver}

# 1.c) Auth Genel (Varsay?lan Limit - Kapsay?c? /** en sonda olmal?)
