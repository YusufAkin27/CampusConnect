# ============================================================
# Admin Service - Application Properties
# CampusConnect Microservice Architecture
# ============================================================

# Server
server.port=8088

# Application
spring.application.name=admin-service

# ============================================================
# PostgreSQL Database
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/campusconnect_admin
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Consul Service Discovery
# ============================================================
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=admin-service
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${server.port}
spring.cloud.consul.discovery.prefer-ip-address=true

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ============================================================
# Security - JWT
# ============================================================
app.jwt.secret=
app.jwt.token-prefix=Bearer 
app.jwt.header=Authorization

# ============================================================
# OpenAPI / Swagger
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ============================================================
# Feign Client Configuration
# ============================================================
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=10000
spring.cloud.openfeign.client.config.default.logger-level=BASIC

spring.cloud.openfeign.client.config.user-service.connect-timeout=5000
spring.cloud.openfeign.client.config.user-service.read-timeout=10000

spring.cloud.openfeign.client.config.post-service.connect-timeout=5000
spring.cloud.openfeign.client.config.post-service.read-timeout=10000

spring.cloud.openfeign.client.config.media-service.connect-timeout=5000
spring.cloud.openfeign.client.config.media-service.read-timeout=10000

spring.cloud.openfeign.client.config.notification-service.connect-timeout=5000
spring.cloud.openfeign.client.config.notification-service.read-timeout=10000

spring.cloud.openfeign.client.config.logging-service.connect-timeout=5000
spring.cloud.openfeign.client.config.logging-service.read-timeout=10000

spring.cloud.openfeign.client.config.auth-service.connect-timeout=5000
spring.cloud.openfeign.client.config.auth-service.read-timeout=10000

# ============================================================
# Logging
# ============================================================
logging.level.com.campusconnect=DEBUG
logging.level.admin_service=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.max-age=3600
