server.port=8092
spring.application.name=event-service

spring.datasource.url=jdbc:postgresql://localhost:5432/campusconnect_event
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=event-service
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${server.port}
spring.cloud.consul.discovery.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

event.scheduler.enabled=true

media.service.name=media-service
logging.service.name=logging-service

# ==========================================
# OpenAPI / Scalar
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false
scalar.enabled=true
scalar.path=/scalar
scalar.title=Campus Connect Event Service API
