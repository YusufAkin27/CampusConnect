# =============================================
# COMMENT SERVICE - Application Properties
# CampusConnect Microservice
# =============================================

# Server
server.port=8089
spring.application.name=comment-service

# =============================================
# DATABASE - PostgreSQL
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/campusconnect_comment
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# CONSUL DISCOVERY
# =============================================
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=comment-service
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.prefer-ip-address=true

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

# =============================================
# OPENAPI / SCALAR
# =============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false
scalar.enabled=true
scalar.path=/scalar
scalar.title=Campus Connect Comment Service API

# =============================================
# SERVICE CLIENTS
# =============================================
post-service.base-url=http://post-service
story-service.base-url=http://story-service
user-service.base-url=http://user-service

# =============================================
# LOGGING
# =============================================
logging.level.comment_service=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
