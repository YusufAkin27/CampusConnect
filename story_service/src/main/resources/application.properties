# ============================================
# Story Service Configuration
# ============================================

server.port=8088
spring.application.name=story-service

# ============================================
# PostgreSQL Database
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/campusconnect_story
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# Consul Service Discovery
# ============================================
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=story-service
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.prefer-ip-address=true

# ============================================
# Actuator
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ============================================
# OpenAPI / Swagger
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ============================================
# Inter-service Communication
# ============================================
media.service.name=media-service
user.service.name=user-service
friend.service.name=friend-service

# ============================================
# Story Configuration
# ============================================
story.expiration.hours=24
story.scheduler.enabled=true
story.scheduler.cron=0 */5 * * * *

# ============================================
# Logging
# ============================================
logging.level.story_service=DEBUG
logging.level.org.springframework.cloud=INFO
logging.level.org.hibernate.SQL=DEBUG
