# ===== Server =====
server.port=8087

# ===== Application =====
spring.application.name=media-service

# ===== DataSource =====
spring.datasource.url=jdbc:postgresql://localhost:5432/campusconnect_media
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Multipart =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=60MB

# ===== Consul Discovery =====
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=media-service
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${server.port}

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===== OpenAPI / Scalar =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false
scalar.enabled=true
scalar.path=/scalar
scalar.title=Campus Connect Media Service API

# ===== Media Storage Settings =====
# Storage provider: LOCAL or CLOUDINARY
app.media.storage-provider=CLOUDINARY
app.media.local-upload-dir=uploads
app.media.public-base-url=http://localhost:8087/uploads

# ===== Cloudinary =====
cloudinary.cloud-name=devhfhhnb
cloudinary.api-key=166862541637793
cloudinary.api-secret=Ejkqp9U4l1dXNexe6kDb0INk340

# ===== File Size Limits (bytes) =====
app.media.max-image-size=5242880
app.media.max-video-size=52428800
app.media.max-file-size=10485760

# ===== Cleanup Scheduler =====
app.media.cleanup.enabled=true

# ===== Seed =====
app.seed.enabled=false

# ===== Other service URLs =====
user-service.base-url=http://user-service
post-service.base-url=http://post-service
