# ============================================================
# User Service - Application Properties
# CampusConnect Microservice Architecture
# ============================================================

# Server
server.port=8082

# Application
spring.application.name=user-service

# ============================================================
# PostgreSQL Database
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/campusconnect_users
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Consul Service Discovery
# ============================================================
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=user-service
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${server.port}
spring.cloud.consul.discovery.prefer-ip-address=true

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ============================================================
# Security - JWT Resource Server
# ============================================================
# JWT secret key (same key as auth-service - shared secret for HS256)
# NOTE: In production, use environment variables or config server for this value
app.jwt.secret=

# ============================================================
# OpenAPI / Scalar
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false
scalar.enabled=true
scalar.path=/scalar
scalar.title=Campus Connect User Service API

# ============================================================
# Logging
# ============================================================
logging.level.com.campusconnect=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================================
# Data Initialization (Development Only)
# ============================================================
# Set to true only in development to seed sample data
app.seed.enabled=false
