# ==========================================
# Friend Service - Application Properties
# ==========================================

server.port=8084
spring.application.name=friend-service

# ==========================================
# PostgreSQL DataSource
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/campusconnect_friends
spring.datasource.username=postgres
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Consul Discovery
# ==========================================
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=friend-service
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${server.port}

# ==========================================
# Actuator
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==========================================
# OpenAPI / Scalar
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false
scalar.enabled=true
scalar.path=/scalar
scalar.title=Campus Connect Friend Service API

# ==========================================
# Data Seeding (Development)
# ==========================================
app.seed.enabled=false

# ==========================================
# User Service Internal Base URL (Consul LB)
# ==========================================
user-service.base-url=http://user-service

# ==========================================
# Spring Security (Resource Server)
# JWT issuer-uri - configure when auth-service is ready
# spring.security.oauth2.resourceserver.jwt.issuer-uri=http://auth-service/issuer
# ==========================================
