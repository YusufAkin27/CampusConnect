# ==========================================
# CampusConnect - Logging Service
# ==========================================

server.port=8085
spring.application.name=logging-service

# ==========================================
# PostgreSQL DataSource
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/campusconnect_logs
spring.datasource.username=postgres
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Batch Insert Performance Settings
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ==========================================
# Consul Service Discovery
# ==========================================
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=logging-service
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${server.port}
spring.cloud.consul.discovery.prefer-ip-address=true

# ==========================================
# Actuator
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ==========================================
# OpenAPI / Swagger
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ==========================================
# Application Custom Properties
# ==========================================
app.seed.enabled=false
app.log-cleanup.enabled=true
app.log.batch.max-size=500
app.log.retention.default-days=90

# ==========================================
# Logging
# ==========================================
logging.level.root=INFO
logging.level.logging_service=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
